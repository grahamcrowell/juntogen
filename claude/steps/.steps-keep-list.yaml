# .steps-keep-list.yaml — BL-025-h step-prompt vocabulary audit exemptions.
#
# PURPOSE: Enumerate the [EXTERNAL] platform-fact terms inside the
#          juntogen step-prompt corpus (juntogen/claude/steps/*.md) that
#          legitimately reference Claude-platform identifiers
#          (Task tool / TeamCreate / TeamDelete / SendMessage /
#          SubagentStart). Any occurrence of a banned term in a file that
#          is NOT exempted here is flagged by
#          step-prompt-vocabulary-audit.sh.
#
# SCOPE:   juntogen/claude/steps/ ONLY. Distinct from the spec-corpus
#          keep_list in juntospec/platform-contract.yaml. The two regimes
#          are intentionally separate:
#            - juntospec/platform-contract.yaml.keep_list governs the
#              core spec corpus (D/F/M*.md + README + MANIFEST).
#            - this file governs the step-prompt middle layer in juntogen.
#
# RATIONALE: Step prompts are the bridge between abstract spec corpus and
#            generated platform artifacts. Within them, references to
#            Claude tool/hook identifiers are appropriate where a step
#            prompt is documenting the snapshot schema, the hook contract,
#            or a settings.json invariant. The audit holds spec-prose
#            (Triage scoring, Design intent, Synthesis instructions) to
#            the abstract primitive vocabulary.
#
# EXEMPTION MODEL — FILE-SCOPED (OJ-16):
#   An entry pairs a (file, term). It means "this term is allowed
#   ANYWHERE in this file." There is NO line: field. This makes the
#   exemption immune to line moves: inserting or deleting lines above a
#   legitimate occurrence no longer desyncs the audit. (The prior model
#   anchored each occurrence to an exact file:line, which shifted and
#   desynced every time an unrelated edit inserted lines above it —
#   producing false term-mismatch and banned-term-bleed failures. That
#   recurred more than once and motivated this migration.)
#
#   DELIBERATE PRECISION TRADE-OFF: file-scoping is coarser than
#   line-anchoring. A second, unreviewed occurrence of an already-allowed
#   term in the same file is out of detection scope by design; the audit
#   guards the file-doesn't-mention-this-term-at-all regression class
#   (a term newly appearing in a file that has no exemption for it), not
#   occurrence count within an already-exempted file. This is the
#   accepted cost of line-move immunity.
#
# Entry shape:
#   - file: "step-00-platform-ingestion.md"
#     term: "TeamCreate"
#     match_kind: "literal"
#     reason: "capability-schema"
#     note: "Free-form rationale for WHY this term belongs in this file."
#
# Permitted reasons (step-prompt audit enum):
#   capability-schema           — step-00 platform.tools / hooks YAML rows
#   capability-schema-prose     — step-00 didactic notes about schema
#   inject-profile-binding      — step-07 SubagentStart hook contract refs
#   installer-hook-prose        — RETIRED with step-08 (BL-025-m.1).
#                                 Reason name retained for one-cycle audit
#                                 compatibility; no live entries remain.
#   settings-json-binding       — step-09 settings.json hook block refs
#   teardown-binding            — step-06 Convene primitive teardown call
#                                 (shutdown_request / TeamDelete)
#   platform-fact-env-var-doc   — step-09 env-var documentation
#   convene-fallback-binding    — step-01/step-06/step-07 prose documenting
#                                 the Convene→Consult fallback path (Axiom 8).
#                                 The fallback explicitly enumerates the
#                                 platform tools that ARE unavailable when
#                                 the agent-teams substrate is off (TeamCreate,
#                                 TeamDelete, SendMessage) and the tool that
#                                 REPLACES them in the degraded path
#                                 (Task tool, used as the deputy-coordinator
#                                 spawn primitive). Each occurrence is a
#                                 platform-fact reference, not spec vocabulary.

keep_list:

  # ── step-00: Platform capability ingestion ──────────────────────────
  # Capability schema YAML rows + didactic schema prose — frozen
  # platform-tool / hook name list.
  - file: "step-00-platform-ingestion.md"
    term: "Task tool"
    match_kind: "literal"
    reason: "capability-schema"
    note: "Schema comment binding 'Agent' (platform name) to 'Task tool' (legacy spec vocabulary), plus capability-schema-prose didactic notes elsewhere in the file explaining that the platform 'Agent' is referred to as 'Task tool' in the spec corpus."
  - file: "step-00-platform-ingestion.md"
    term: "TeamCreate"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating the TeamCreate platform tool in the capability schema."
  - file: "step-00-platform-ingestion.md"
    term: "TeamDelete"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating the TeamDelete platform tool in the capability schema."
  - file: "step-00-platform-ingestion.md"
    term: "SendMessage"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.tools[] YAML row enumerating the SendMessage platform tool in the capability schema."
  - file: "step-00-platform-ingestion.md"
    term: "SubagentStart"
    match_kind: "literal"
    reason: "capability-schema"
    note: "platform.hooks[] YAML row enumerating the SubagentStart hook point, plus capability-schema-prose usages: hook-matcher notes, the verification checklist item asserting the hooks section carries a SubagentStart entry, and output-binding notes describing how step-07/step-09 consume hooks[point=SubagentStart].matchers[0]."

  # -- step-01: Convene fallback prose (Axiom 8 degraded path) --
  - file: "step-01-scaffold-and-protocol.md"
    term: "TeamCreate"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Fallback prose enumerating the agent-teams tools that become unavailable when CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS is unset, and warning that adopters otherwise hit 'Unknown tool: TeamCreate'. Platform-fact reference, not spec vocabulary."
  - file: "step-01-scaffold-and-protocol.md"
    term: "SendMessage"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Fallback prose enumerating SendMessage among the agent-teams tools that become unavailable when the substrate is off. Platform-fact reference, not spec vocabulary."
  - file: "step-01-scaffold-and-protocol.md"
    term: "Task tool"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Fallback prose naming the Task tool as the deputy-coordinator spawn primitive that replaces the agent-teams substrate in the degraded Complex-tier path. Platform-fact reference, not spec vocabulary."

  # -- step-03: inject-profile + convene-fallback platform-fact refs --
  - file: "step-03-agent-profiles.md"
    term: "SubagentStart"
    match_kind: "literal"
    reason: "inject-profile-binding"
    note: "Profile-frontmatter contract prose referencing the SubagentStart hook by which oj-helper inject-profile injects profiles as additionalContext. Platform-fact reference."
  - file: "step-03-agent-profiles.md"
    term: "Task tool"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Prose describing that full-profile frontmatter is stripped before injection into general-purpose Task spawns. Platform-fact reference, not spec vocabulary."

  # -- step-04: execution-protocol reference-file platform-fact refs --
  - file: "step-04-reference-files.md"
    term: "Task tool"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Effort-out-of-scope note explaining that per-expert effort is not controllable because profiles are injected into general-purpose Task spawns. Platform-fact reference, not spec vocabulary."
  - file: "step-04-reference-files.md"
    term: "SubagentStart"
    match_kind: "literal"
    reason: "inject-profile-binding"
    note: "Same effort-out-of-scope note referencing the SubagentStart injection path used to deliver profiles. Platform-fact reference."

  # -- step-06: skill prompts (BL-025-m.2: commands -> skills) --
  - file: "step-06-commands.md"
    term: "Task tool"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Execution-model branch prose naming the Task tool for Moderate 3-phase engagement and the deputy-coordinator parallel-Consult fan-out in the Convene→Consult fallback. Platform-fact reference, not spec vocabulary."
  - file: "step-06-commands.md"
    term: "TeamCreate"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Complex-branch prose describing when to proceed with TeamCreate (agent-teams available) versus the deputy-coordinator fallback (unavailable). Platform-fact reference, not spec vocabulary."
  - file: "step-06-commands.md"
    term: "SendMessage"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "Complex-branch fallback prose enumerating SendMessage among the agent-teams tools gated on the availability probe. Platform-fact reference, not spec vocabulary."
  - file: "step-06-commands.md"
    term: "SubagentStart"
    match_kind: "literal"
    reason: "teardown-binding"
    note: "Health-check skill description and probe listing referencing SubagentStart hook wiring inspection (hooks/hooks.json matcher). Platform-fact reference."

  # -- step-07: oj-helper inject-profile contract --
  - file: "step-07-helper-script.md"
    term: "SubagentStart"
    match_kind: "literal"
    reason: "inject-profile-binding"
    note: "oj-helper inject-profile contract prose: SubagentStart is the hook that invokes inject-profile, and the agent-type filter is resolved from hooks[point='SubagentStart'].matchers[0]. Multiple platform-fact references across the subcommand spec and invocation notes."
  - file: "step-07-helper-script.md"
    term: "TeamCreate"
    match_kind: "literal"
    reason: "convene-fallback-binding"
    note: "agent-teams-check subcommand prose reporting whether the host has the experimental agent-teams feature (the substrate that binds TeamCreate). Platform-fact reference, not spec vocabulary."

  # ── step-08: RETIRED (BL-025-m.1) ───────────────────────────────────
  # Makefile installer obsolete in plugin form. step-08-installer.md
  # deleted; keep_list entries removed with it. Numeric gap preserved.

  # ── step-09: RETIRED in plugin form (BL-025-m.2) ────────────────────
  # Pre-cycle step-09 emitted src/settings.json with TeamCreate/TeamDelete
  # env-var docs and 7 SubagentStart hook-binding references. Plugin form
  # retires settings.json (user-configured under ~/.claude/, outside the
  # plugin distribution); SubagentStart bindings relocated to step-07
  # (inject-profile agent-type filter) and the static hooks.json manifest
  # emitted by lib/emit-static-plugin-manifest.sh. No live step-09 keep_list
  # entries remain. Numeric gap preserved per generator ALL_STEPS comment.
